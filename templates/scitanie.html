<!doctype html>
<html lang="sk">
<head>
    <meta charset="utf-8">
    <title>Sčítanie cez API</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 520px; margin: 40px auto; padding: 0 16px; color: #1d2733; }
        h1 { color: #2a7ed6; }
        input { padding: 8px; width: 90px; font-size: 1rem; }
        button { padding: 8px 16px; font-size: 1rem; background: #2a7ed6; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
        button:hover { background: #2168b3; }
        #vysledok { margin-top: 18px; font-size: 1.6rem; font-weight: bold; color: #2a7ed6; min-height: 2rem; }
    </style>
</head>
<body>
    <h1>🧮 Kalkulačka cez API</h1>
    <p>Zadaj dve čísla, vyber operáciu a stlač <b>Spočítať</b> (alebo <b>Enter</b>). Výsledok sa objaví <b>bez obnovenia stránky</b>.</p>

    <input type="text" id="a" placeholder="napr. 2">
    <select id="op">
        <option value="scitaj">+</option>
        <option value="odcitaj">−</option>
        <option value="nasob">×</option>
        <option value="delit">÷</option>
    </select>
    <input type="text" id="b" placeholder="napr. 3">
    <button onclick="spocitaj()">Spočítať</button>

    <div id="vysledok"></div>

    <script>
        // znaky operacii pre pekny vypis
        const ZNAKY = { scitaj: "+", odcitaj: "−", nasob: "×", delit: "÷" };

        async function spocitaj() {
            const a = document.getElementById("a").value;
            const b = document.getElementById("b").value;
            const op = document.getElementById("op").value;
            const vysledok = document.getElementById("vysledok");

            // fetch zavola TVOJ API a pocka na odpoved (JSON)
            const odpoved = await fetch(`/api/vypocet?a=${a}&b=${b}&op=${op}`);
            const data = await odpoved.json();

            // vysledok dopiseme na stranku - BEZ obnovenia
            if (data.chyba) {
                vysledok.textContent = "⚠️ " + data.chyba;
            } else {
                vysledok.textContent = `${data.a} ${ZNAKY[data.op]} ${data.b} = ${data.vysledok}`;
            }
        }

        // pocitat aj po stlaceni Enter v polickach
        for (const id of ["a", "b"]) {
            document.getElementById(id).addEventListener("keydown", (e) => {
                if (e.key === "Enter") spocitaj();
            });
        }
    </script>
</body>
</html>
