<!doctype html>
<html lang="sk">
<head>
    <meta charset="utf-8">
    <title>Moje výdavky</title>
</head>
<body>
    <h1>💰 Moje výdavky</h1>

    <h2>Pridať výdavok</h2>
    <form action="/pridaj" method="post">
        <label>Suma: <input type="text" name="suma" required></label>
        <label>Kategória: <input type="text" name="kategoria" value="ine"></label>
        <label>Dátum: <input type="text" name="datum" placeholder="RRRR-MM-DD (prázdne = dnes)"></label>
        <label>Poznámka: <input type="text" name="poznamka"></label>
        <button type="submit">Pridať</button>
    </form>

    {% if vydavky %}
    <table border="1" cellpadding="6">
        <tr>
            <th>#</th>
            <th>Dátum</th>
            <th>Suma</th>
            <th>Kategória</th>
            <th>Poznámka</th>
        </tr>
        {% for v in vydavky %}
        <tr>
            <td>{{ v[0] }}</td>
            <td>{{ v[3] }}</td>
            <td>{{ "%.2f"|format(v[1]) }} {{ mena }}</td>
            <td>{{ v[2] }}</td>
            <td>{{ v[4] }}</td>
        </tr>
        {% endfor %}
    </table>
    {% else %}
    <p>Zatiaľ žiadne výdavky.</p>
    {% endif %}
</body>
</html>
